# Plot3D — minimalist structured-grid CFD format.
# Source: sim-parse/docs/extraction_reference.md §13

format: plot3d
description: "Plot3D — NASA structured-grid format; .xyz mesh + .q solution (or .f function)"

identification:
  type: extension_pair
  extensions:
    - mesh: [".xyz", ".x", ".g"]
    - solution: [".q"]
    - function: [".f", ".func"]
  signature_check:
    description: "First int = number of blocks; subsequent ints = block dimensions"
    cannot_use_magic: true                  # no fixed magic bytes; structure-only
  confidence: MED                            # .xyz could be other things; pair them

reader_tool:
  primary: "vtkmodules.vtkIOParallel.vtkMultiBlockPLOT3DReader"
  notes: "Requires both .xyz (mesh) and .q (or .f) — set XYZFileName and QFileName"

structure:
  description: "Pure binary or ASCII; multi-block; structured (IJK) only"
  layout:
    - "n_blocks: int"
    - "for each block: (I, J, K) dimensions"
    - "for each block: (X, Y, Z) coordinate arrays"
  solution_q_layout:
    - "5 variables per block, in order: rho, rho*u, rho*v, rho*w, rho*E"
  function_f_layout:
    - "n variables (user-defined count); names not stored"

quirks:
  - id: variables_unnamed
    description: "Plot3D stores variables positionally; names are convention only"
    detect: "always true for .q files"
    workaround: |
      For .q:  positions 0-4 = (rho, rho*u, rho*v, rho*w, rho*E) — universal
      For .f:  user must specify names externally (e.g. via metadata file)
    confidence: HIGH

  - id: byte_order_variants
    description: "Big-endian vs little-endian — both common, must auto-detect"
    detect: "First int (block count) reads as huge number → wrong endianness"
    workaround: |
      VTK reader auto-detects via BYTE_ORDER property; manual readers must
      try both and pick the one yielding sane block dimensions.
    confidence: HIGH

  - id: precision_variants
    description: "Single (32-bit) vs double (64-bit) precision"
    detect: "vtkMultiBlockPLOT3DReader.SetDoublePrecision"
    workaround: "Try float32 first; if mesh dims are absurd, switch to float64"
    confidence: HIGH

  - id: iblank_arrays
    description: "Optional IBLANK array marks active/inactive grid points"
    detect: "vtkMultiBlockPLOT3DReader.SetIBlanking(True)"
    affects: "Cell counts in active zones"
    confidence: MED

  - id: ascii_vs_binary
    description: "Plot3D files can be ASCII or binary; same extension"
    detect: "Try parse first int as ASCII; if fails, treat as binary"
    workaround: "vtkMultiBlockPLOT3DReader.SetBinaryFile(0/1)"
    confidence: HIGH

variable_naming_convention:
  description: "Positional in .q; convention from NASA"
  q_file_positions:
    0: "Density (rho)"
    1: "X-momentum (rho*u)"
    2: "Y-momentum (rho*v)"
    3: "Z-momentum (rho*w)"
    4: "Total energy per unit volume (rho*E)"
  derived_quantities:
    velocity_x: "rho*u / rho"
    pressure: "(gamma - 1) * (rho*E - 0.5 * rho * |u|^2)"
    temperature: "p / (rho * R_specific)"
