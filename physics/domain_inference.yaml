# Domain inference clue table — meta-routing layer.
#
# Purpose: given a parsed case's surface signals (solver application name +
# present field names + boundary patch types), suggest which physics
# domain(s) to consult next. Cheaper-than-Tier-5 routing for LLM agents
# and downstream tools that must decide "do I need to load combustion
# rules or heat_transfer rules for this case?".
#
# This is NOT a hard judgment — multiple clues may match a single case
# (e.g. a reactingFoam case is BOTH combustion AND fluid_dynamics).
# Consumers should treat the output as a ranked list of candidate domains
# to explore, not a unique label.
#
# Source: synthesized from PostDrive's OpenfoamAnalysis.skill.md clue table
# + sim-knowledge/physics canonical variable lists.
#
# Schema (clue table):
#   - id            : unique slug (kebab-case)
#   - domain        : which physics/<dir> to consult on match
#   - confidence    : strong / moderate / weak — how reliable the inference is
#   - description   : one-line human summary
#   - if_any_field  : presence of ANY listed field name → match
#   - if_all_fields : presence of ALL listed field names → match
#   - if_no_fields  : absence of ALL listed field names → match (used for
#                     negative gates like "no T" → not heat transfer)
#   - if_application_substring : solver app name contains this substring
#   - if_patch_type : any boundary patch has one of these types
#
# Field name matching: case-insensitive, checks against the union of
# Tier 2 `variables` and Tier 3 boundary patch type lists.
#
# ⚠️ TODO (cross-solver gap): the field names below are OpenFOAM-style
# ("p", "U", "CH4"). The evaluator does .lower() but does NOT expand
# cross-solver aliases. Fluent fields like "PRESSURE" / "X_VELOCITY"
# lower to "pressure" / "x_velocity" — they will NOT match the "p" / "U"
# clues here. The `aliases_matched_against` blocks below are documentation
# only; not yet consumed by sim-parse's discovery/semantic.py evaluator.
#
# Fix path: either (a) implement alias expansion in _add_candidate_domains
# using physics/<domain>/variables.yaml::aliases, or (b) replace clue
# field names with canonical names from variables.yaml and translate
# parse_result fields → canonical at evaluation time.
#
# Until fixed, candidate_domains works correctly on OpenFOAM cases but
# returns sparse / no matches on Fluent / CGNS cases.

domain: meta_routing
domain_description: "Meta-routing — pick which physics domain to dig into"

clues:

  - id: aerodynamics-pure
    domain: aerodynamics
    confidence: moderate
    description: "Pressure + velocity present, no temperature → likely pure aerodynamics / incompressible flow"
    if_all_fields: ["p", "U"]      # OpenFOAM names; aliases handled below
    if_no_fields:  ["T", "h"]
    aliases_matched_against:
      p: ["p", "pressure", "Pressure", "P"]
      U: ["U", "velocity", "Velocity", "V"]
      T: ["T", "temperature", "Temperature"]
      h: ["h", "enthalpy"]

  - id: heat-transfer
    domain: heat_transfer
    confidence: strong
    description: "Temperature field present → heat transfer is in the model"
    if_any_field: ["T", "temperature", "Temperature", "h", "enthalpy"]

  - id: compressible-coupled
    domain: compressible_flow
    confidence: strong
    description: "p + T + U all present → compressible flow / thermo-fluid coupling"
    if_all_fields: ["p", "T", "U"]

  - id: combustion-by-species
    domain: combustion
    confidence: strong
    description: "Reactive species fields present (CH4 / O2 / CO2 / Y_*) → combustion / chemical reactions"
    if_any_field:
      - CH4
      - O2
      - CO2
      - CO
      - H2
      - H2O
      - OH
      - Qdot
      - Ydefault
      # Y_ prefix would need glob match — current schema is exact.
      # Consumers should also do `any(name.startswith("Y_") for name in fields)`.

  - id: combustion-by-application
    domain: combustion
    confidence: strong
    description: "Solver name contains 'reacting' / 'combustion' / 'fire' → combustion solver"
    if_application_substring: ["reacting", "combustion", "fire", "spray"]

  - id: multiphase
    domain: multiphase
    confidence: strong
    description: "Phase-fraction field present → multiphase flow (VOF / Eulerian)"
    if_any_field:
      - alpha
      - alpha.water
      - alpha.air
      - alpha.gas
      - alpha.liquid

  - id: natural-convection-by-application
    domain: aerothermal
    confidence: moderate
    description: "Solver name contains 'buoyant' → buoyancy-driven flow (aerothermal coupling)"
    if_application_substring: ["buoyant"]

  - id: turbulence-required
    domain: fluid_dynamics
    confidence: moderate
    description: "Turbulent-kinetic-energy field present → turbulent flow"
    if_any_field: ["k", "epsilon", "omega", "nut", "nuTilda", "R"]

  - id: structural-fea
    domain: structural
    confidence: strong
    description: "Stress / displacement / strain fields → structural FEA"
    if_any_field:
      - sigma
      - stress
      - displacement
      - U_struct
      - strain
      - vonMises

  # ── aerodynamics 细化 ─────────────────────────────────────────
  - id: aerodynamics-forces
    domain: aerodynamics
    confidence: strong
    description: "forceCoeffs 函数对象输出 → 外流气动后处理"
    if_any_field: ["forceCoeffs", "Cl", "Cd", "Cm"]
    # ⚠️ evaluator gap: 除了 tier_2.variables，还需扫 tier_2.post_processing
    # 列表才能命中 forceCoeffs 函数对象。当前 sim-parse 只匹配 variables。

  # ── aerothermal 细化 ─────────────────────────────────────────
  - id: aerothermal-cht
    domain: aerothermal
    confidence: strong
    description: "多区域共轭传热 solver"
    if_application_substring: ["chtMultiRegion", "conjugateHeatFoam"]

  - id: aerothermal-wall-heat-flux
    domain: aerothermal
    confidence: moderate
    description: "壁面热流 BC → 气动热"
    if_patch_type: ["fixedHeatFlux", "wallHeatTransfer", "externalWallHeatFluxTemperature"]
    # ⚠️ evaluator gap: if_patch_type 当前未被 sim-parse 消费。
    # 需在 discovery/semantic.py 内加上对 tier_3 boundaries[].type 的迭代。

  # ── internal_flow ─────────────────────────────────────────────
  - id: internal-flow-by-topology
    domain: internal_flow
    confidence: strong
    description: "存在 inlet+outlet patch 且无外流远场 → 内流"
    if_patch_type: ["patch"]
    # ⚠️ evaluator gap: 完整语义需 evaluator 扩展 —— patch 名 in {inlet,outlet}
    # 且无 freestream/farfield。当前 schema 不支持复合条件，先用 patch type
    # = 'patch' 作粗筛，evaluator 后续可加 if_patch_name_any / if_patch_name_none。

  - id: internal-flow-mrf
    domain: internal_flow
    confidence: strong
    description: "MRF / 旋转参考系 → 涡轮机械内流"
    if_application_substring: ["MRFSimpleFoam", "MRFPimpleFoam", "rotorDisk"]

  # ── multibody ────────────────────────────────────────────────
  - id: multibody-by-application
    domain: multibody
    confidence: strong
    description: "多体动力学 solver"
    if_application_substring: ["sixDoF", "rigidBody", "LSDYNA-explicit-contact"]

  # ── acoustics ────────────────────────────────────────────────
  - id: acoustics-by-application
    domain: acoustics
    confidence: strong
    description: "声学 solver / FW-H 函数对象"
    if_application_substring: ["acoustic", "FWH", "Curle"]

  - id: acoustics-by-variable
    domain: acoustics
    confidence: strong
    description: "声压场存在"
    if_any_field: ["p_acoustic", "p_a", "SPL", "soundPressureLevel"]

# How consumers should use this:
#
# 1. Collect from parse_case result:
#       solver_app = result["tier_3_metadata"].get("application", "").lower()
#       fields = set((result["tier_2_inventory"].get("variables") or []))
#
# 2. For each clue, evaluate the if_* conditions. ALL specified conditions
#    in a single clue must match. Empty / absent conditions are treated as
#    "always true" (so a clue with only if_any_field doesn't require anything
#    else).
#
# 3. Collect matched domains. Rank by:
#    - confidence: strong > moderate > weak
#    - then by number of clues that fired for that domain
#
# 4. Surface to LLM as: "candidate domains to consult: [combustion (strong,
#    2 clues), fluid_dynamics (strong, 1 clue), heat_transfer (moderate, 1)]".
#
# This routing is intentionally lightweight — it just narrows the search
# space. Hard physics judgments still come from physics/<domain>/criteria.yaml.
